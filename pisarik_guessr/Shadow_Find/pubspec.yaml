name: shadow_find
description: Shadow Find — угадай, где сделан снимок
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.4
  http: ^1.2.1

  camera: ^0.10.5+9
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  exif: ^3.3.0
  flutter_launcher_icons: ^0.13.1

  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  provider: ^6.1.2

  sqflite: ^2.4.1
  path: ^1.9.1

  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  gap: ^3.0.1
  intl: ^0.19.0

  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  image: ^4.1.7
  timeago: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/
