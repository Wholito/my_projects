name: pisarik_guessr
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  provider: ^6.1.5+1
  google_fonts: ^8.1.0
  image_picker: ^1.1.2
  dio: ^5.7.0
  connectivity_plus: ^6.0.3
  http: ^1.2.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/games/
    - assets/characters/dota2/
    - assets/characters/brawl_stars/
    - assets/icon/icon.png
    - assets/items/dota/
    - assets/items/bs/
    - assets/russian_words.txt

flutter_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  adaptive_icon_background: "#1E1A15"
  adaptive_icon_foreground: "assets/icon/icon.png"